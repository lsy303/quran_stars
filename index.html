<body>

<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

// ─── Firebase ───────────────────────────────────────
const firebaseConfig={

  authDomain:"quran-stars.firebaseapp.com",

// ─── Constants ──────────────────────────────────────
const PWD="quran1446";
const DL=[
  {id:"l1",name:"برونزي",icon:"🥉",min:0,  max:20,  color:"#92400E",bg:"#FEF3C7"},
  {id:"l2",name:"فضي",  icon:"🥈",min:21, max:50,  color:"#374151",bg:"#F3F4F6"},
  {id:"l3",name:"ذهبي", icon:"🥇",min:51, max:100, color:"#B45309",bg:"#FFFBEB"},
  {id:"l4",name:"ماسي", icon:"💎",min:101,max:9999,color:"#1D4ED8",bg:"#EFF6FF"},

const DC=[
  {id:"hifz",      label:"إنجاز الحفظ",     icon:"📖",pts:3},
  {id:"tajweed",   label:"جودة التسميع",     icon:"🎙️",pts:2},
  {id:"plan",      label:"الالتزام بالخطة", icon:"📅",pts:2},
  {id:"attendance",label:"الانتظام والحضور",icon:"✅",pts:1},
  {id:"behavior",  label:"حسن السلوك",      icon:"🌸",pts:1},

];
const DS={centerName:"مركز تحفيظ القرآن الكريم",centerSubtitle:"لوحة النجوم",centerEmoji:"🕌",centerLogo:null,accentColor:"#15803D",levels:DL,categories:DC};
const AVT=["🌺","🌸","🌼","🦋","🌙","⭐","🌿","💐","🕊️","🌻","🍃","✨","🌈","🎀","🌾","🏵️"];
const LEM=["🥉","🥈","🥇","💎","🏆","⭐","🌟","🎖️","🏅","👑","🌺","🌸"];
const QT=["خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ","مَنْ قَرَأَ حَرْفًا مِنْ كِتَابِ اللَّهِ فَلَهُ بِهِ حَسَنَةٌ وَالْحَسَنَةُ بِعَشْرِ أَمْثَالِهَا","إِنَّ الَّذِي لَيْسَ فِي جَوْفِهِ شَيْءٌ مِنَ الْقُرْآنِ كَالْبَيْتِ الْخَرِبِ"];
const C={pageBg:"#F8FAFC",cardBg:"#FFFFFF",subtleBg:"#F1F5F9",borderCol:"#E2E8F0",green:"#15803D",greenMid:"#16A34A",greenLight:"#BBF7D0",greenPale:"#F0FDF4",gold:"#D97706",goldLight:"#FCD34D",textDark:"#0F172A",textMid:"#475569",textLight:"#94A3B8",danger:"#DC2626"};

function glv(stars,levels){const l=levels||DL;return l.find(x=>stars>=x.min&&stars<=x.max)||l[0];}

// ─── Atoms ───────────────────────────────────────────
function Toast({msg,show}){return <div style={{position:"fixed",bottom:24,left:"50%",transform:`translateX(-50%) translateY(${show?0:90}px)`,background:C.green,color:"#fff",padding:"12px 24px",borderRadius:14,fontSize:14,fontWeight:600,zIndex:9999,transition:"transform 0.35s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:"0 8px 32px rgba(21,128,61,0.35)",whiteSpace:"nowrap",pointerEvents:"none"}}>{msg}</div>;}

function Modal({open,onClose,title,children,wide}){
  if(!open)return null;
  return <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.45)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.cardBg,borderRadius:20,padding:"26px 28px",width:"100%",maxWidth:wide?680:480,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.18)",animation:"slideUp 0.25s ease"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:800,color:C.textDark}}>{title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textLight,padding:"2px 8px"}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

function Btn({children,onClick,variant="green",style:ex={},disabled}){
  const base={border:"none",borderRadius:10,fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:13,cursor:disabled?"not-allowed":"pointer",padding:"10px 18px",transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:6,opacity:disabled?0.4:1};
  const v={green:{background:C.green,color:"#fff",boxShadow:"0 2px 8px rgba(21,128,61,0.28)"},gold:{background:C.gold,color:"#fff",boxShadow:"0 2px 8px rgba(217,119,6,0.28)"},ghost:{background:C.subtleBg,color:C.textMid,border:`1px solid ${C.borderCol}`},danger:{background:"#FEF2F2",color:C.danger,border:"1px solid #FECACA"}};
  return <button style={{...base,...(v[variant]||v.green),...ex}} onClick={!disabled?onClick:undefined}>{children}</button>;
}

function Inp({value,onChange,placeholder,type="text",style:ex={}}){
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{width:"100%",padding:"10px 13px",border:`1.5px solid ${C.borderCol}`,borderRadius:10,fontFamily:"'Cairo',sans-serif",fontSize:13,color:C.textDark,background:C.subtleBg,outline:"none",boxSizing:"border-box",...ex}}/>;
}

function PBar({pct,color}){return <div style={{height:6,background:C.subtleBg,borderRadius:10,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,Math.max(0,pct))}%`,borderRadius:10,background:color||`linear-gradient(90deg,${C.green},${C.greenMid})`,transition:"width 0.6s ease"}}/></div>;}

function Lv({stars,levels,small}){const lv=glv(stars,levels);return <span style={{padding:small?"3px 9px":"4px 12px",borderRadius:20,fontSize:small?10:12,fontWeight:700,background:lv.bg||"#F3F4F6",color:lv.color||C.textDark,display:"inline-flex",alignItems:"center",gap:4}}>{lv.icon} {lv.name}</span>;}

function ST({children}){return <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}><div style={{width:4,height:18,background:C.gold,borderRadius:2}}/><div style={{fontSize:16,fontWeight:800,color:C.textDark}}>{children}</div></div>;}

function Logo({s,size=48}){const a=s.accentColor||C.green;if(s.centerLogo)return <div style={{width:size,height:size,borderRadius:size*0.27,overflow:"hidden",flexShrink:0,boxShadow:`0 2px 10px ${a}40`}}><img src={s.centerLogo} alt="logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>;return <div style={{width:size,height:size,borderRadius:size*0.27,background:a,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.45,flexShrink:0,boxShadow:`0 2px 10px ${a}40`}}>{s.centerEmoji}</div>;}

function ES({icon,text}){return <div style={{padding:"38px 20px",textAlign:"center",color:C.textLight}}><div style={{fontSize:34,marginBottom:9,opacity:0.4}}>{icon}</div><div style={{fontWeight:600,fontSize:14}}>{text}</div></div>;}

// ─── Settings ────────────────────────────────────────
function ModalSettings({open,onClose,settings,onSave}){
  const[form,setForm]=useState({...settings});
  const[tab,setTab]=useState("general");
  const lr=useRef();
  useEffect(()=>{if(open)setForm({...settings,levels:[...settings.levels],categories:[...settings.categories]});},[open,settings]);
  const CLR=[{val:"#15803D"},{val:"#1D4ED8"},{val:"#7C3AED"},{val:"#B45309"},{val:"#B91C1C"},{val:"#0E7490"},{val:"#BE185D"},{val:"#C2410C"}];
  const EM=["🕌","📖","⭐","🌙","🏆","🌿","✨","🎓","🌺","🕋","🌸","🏅"];
  const hl=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setForm(f=>({...f,centerLogo:ev.target.result}));r.readAsDataURL(f);};
  const ul=(i,k,v)=>setForm(f=>({...f,levels:f.levels.map((l,j)=>j===i?{...l,[k]:k==="min"||k==="max"?parseInt(v)||0:v}:l)}));
  const al=()=>setForm(f=>({...f,levels:[...f.levels,{id:"l"+Date.now(),name:"مستوى جديد",icon:"🏅",min:0,max:9999,color:"#374151",bg:"#F3F4F6"}]}));
  const dl=i=>setForm(f=>({...f,levels:f.levels.filter((_,j)=>j!==i)}));
  const uc=(i,k,v)=>setForm(f=>({...f,categories:f.categories.map((c,j)=>j===i?{...c,[k]:k==="pts"?parseInt(v)||0:v}:c)}));
  const ac=()=>setForm(f=>({...f,categories:[...f.categories,{id:"c"+Date.now(),label:"معيار جديد",icon:"⭐",pts:1}]}));
  const dc=i=>setForm(f=>({...f,categories:f.categories.filter((_,j)=>j!==i)}));
  return(
    <Modal open={open} onClose={onClose} title="⚙️ إعدادات المركز" wide>
      <div style={{display:"flex",gap:5,marginBottom:20,background:C.subtleBg,borderRadius:11,padding:4}}>
        {[["general","🏫 عام"],["levels","🎖️ المستويات"],["categories","⭐ المعايير"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"9px 6px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:12,background:tab===id?C.cardBg:"transparent",color:tab===id?C.textDark:C.textLight,boxShadow:tab===id?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>{lbl}</button>
        ))}
      </div>
      {tab==="general"&&<>
        <div style={{marginBottom:18}}>
          <label style={{fontSize:13,fontWeight:700,color:C.textMid,display:"block",marginBottom:10}}>شعار المركز</label>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <Logo s={form} size={60}/>
            <div style={{flex:1}}>
              <input ref={lr} type="file" accept="image/*" onChange={hl} style={{display:"none"}}/>
              <Btn variant="ghost" onClick={()=>lr.current.click()} style={{width:"100%",justifyContent:"center",marginBottom:8}}>📸 رفع صورة الشعار</Btn>
              {form.centerLogo&&<Btn variant="danger" onClick={()=>setForm(f=>({...f,centerLogo:null}))} style={{width:"100%",justifyContent:"center",fontSize:12}}>🗑️ حذف</Btn>}
            </div>
          </div>
          {!form.centerLogo&&<div style={{marginTop:10}}>
            <div style={{fontSize:12,color:C.textLight,marginBottom:7}}>أو اختر رمزاً:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{EM.map(e=><button key={e} onClick={()=>setForm(f=>({...f,centerEmoji:e}))} style={{width:40,height:40,borderRadius:9,fontSize:20,cursor:"pointer",border:`2px solid ${form.centerEmoji===e?C.gold:C.borderCol}`,background:form.centerEmoji===e?"#FFFBEB":C.subtleBg}}>{e}</button>)}</div>
          </div>}
        </div>
        <div style={{marginBottom:13}}><label style={{fontSize:13,fontWeight:700,color:C.textMid,display:"block",marginBottom:7}}>اسم المركز</label><Inp value={form.centerName} onChange={e=>setForm(f=>({...f,centerName:e.target.value}))} placeholder="اسم المركز"/></div>
        <div style={{marginBottom:13}}><label style={{fontSize:13,fontWeight:700,color:C.textMid,display:"block",marginBottom:7}}>العنوان الفرعي</label><Inp value={form.centerSubtitle} onChange={e=>setForm(f=>({...f,centerSubtitle:e.target.value}))} placeholder="لوحة النجوم"/></div>
        <div style={{marginBottom:16}}><label style={{fontSize:13,fontWeight:700,color:C.textMid,display:"block",marginBottom:8}}>لون التمييز</label><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{CLR.map(col=><button key={col.val} onClick={()=>setForm(f=>({...f,accentColor:col.val}))} style={{width:34,height:34,borderRadius:9,background:col.val,border:`3px solid ${form.accentColor===col.val?"#0F172A":"transparent"}`,cursor:"pointer"}}/>)}</div></div>
        <div style={{background:form.accentColor,borderRadius:11,padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}><Logo s={form} size={40}/><div><div style={{color:"#fff",fontWeight:800,fontSize:14}}>{form.centerName||"اسم المركز"}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{form.centerSubtitle}</div></div></div>
      </>}
      {tab==="levels"&&<>
        <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:9,padding:"9px 12px",fontSize:12,color:"#92400E",marginBottom:14}}>💡 حددي نطاق النجوم لكل مستوى</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
          {form.levels.map((lv,i)=>(
            <div key={lv.id} style={{background:C.subtleBg,borderRadius:11,padding:"12px 13px",border:`1px solid ${C.borderCol}`}}>
              <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:9}}>
                <select value={lv.icon} onChange={e=>ul(i,"icon",e.target.value)} style={{width:52,height:35,borderRadius:8,border:`1px solid ${C.borderCol}`,background:C.cardBg,fontSize:17,cursor:"pointer",outline:"none"}}>{LEM.map(em=><option key={em} value={em}>{em}</option>)}</select>
                <Inp value={lv.name} onChange={e=>ul(i,"name",e.target.value)} placeholder="اسم المستوى" style={{flex:1}}/>
                <Btn variant="danger" onClick={()=>dl(i)} style={{padding:"7px 10px"}}>🗑️</Btn>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div><div style={{fontSize:11,color:C.textLight,marginBottom:4}}>من نجمة</div><Inp type="number" value={lv.min} onChange={e=>ul(i,"min",e.target.value)} placeholder="0"/></div>
                <div><div style={{fontSize:11,color:C.textLight,marginBottom:4}}>إلى نجمة</div><Inp type="number" value={lv.max>=9999?"":lv.max} onChange={e=>ul(i,"max",e.target.value||9999)} placeholder="∞"/></div>
                <div><div style={{fontSize:11,color:C.textLight,marginBottom:4}}>لون</div><input type="color" value={lv.color} onChange={e=>ul(i,"color",e.target.value)} style={{width:"100%",height:37,borderRadius:8,border:`1px solid ${C.borderCol}`,cursor:"pointer",padding:2}}/></div>
              </div>
            </div>
          ))}
        </div>
        <Btn variant="ghost" onClick={al} style={{width:"100%",justifyContent:"center"}}>➕ إضافة مستوى</Btn>
      </>}
      {tab==="categories"&&<>
        <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:9,padding:"9px 12px",fontSize:12,color:"#92400E",marginBottom:14}}>💡 حددي المعايير وعدد النجوم</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
          {form.categories.map((c,i)=>(
            <div key={c.id} style={{display:"flex",gap:7,alignItems:"center",background:C.subtleBg,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.borderCol}`}}>
              <Inp value={c.icon} onChange={e=>uc(i,"icon",e.target.value)} placeholder="🌟" style={{width:46,textAlign:"center",fontSize:17,padding:"7px 5px"}}/>
              <Inp value={c.label} onChange={e=>uc(i,"label",e.target.value)} placeholder="اسم المعيار" style={{flex:1}}/>
              <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}><span style={{fontSize:12,color:C.textLight,whiteSpace:"nowrap"}}>نقاط:</span><Inp type="number" value={c.pts} onChange={e=>uc(i,"pts",e.target.value)} style={{width:54,textAlign:"center"}}/></div>
              <Btn variant="danger" onClick={()=>dc(i)} style={{padding:"7px 10px"}}>🗑️</Btn>
            </div>
          ))}
        </div>
        <Btn variant="ghost" onClick={ac} style={{width:"100%",justifyContent:"center"}}>➕ إضافة معيار</Btn>
      </>}
      <div style={{display:"flex",gap:10,marginTop:20}}><Btn variant="ghost" onClick={onClose} style={{flex:1}}>إلغاء</Btn><Btn variant="green" onClick={()=>{onSave(form);onClose();}} style={{flex:2,justifyContent:"center"}}>💾 حفظ</Btn></div>
    </Modal>
  );
}

// ─── Import ──────────────────────────────────────────
function ModalImport({open,onClose,onImport}){
  const[raw,setRaw]=useState("");const[preview,setPreview]=useState(null);const[err,setErr]=useState("");const[mode,setMode]=useState("file");const fr=useRef();
  const reset=()=>{setRaw("");setPreview(null);setErr("");};
  function detect(p){let a=Array.isArray(p)?p:null;if(!a)for(const k of Object.keys(p))if(Array.isArray(p[k])&&p[k].length){a=p[k];break;}if(!a?.length)throw new Error("لم يُعثر على طالبات");const nk=["name","الاسم","اسم الطالبة","اسم","student_name","studentName","fullName","full_name"];const gk=["group","الحلقة","حلقة","الفصل","class","section","halaqah","المجموعة"];const keys=Object.keys(a[0]||{});const nf=nk.find(k=>keys.some(x=>x.toLowerCase()===k.toLowerCase()))||keys[0];const gf=gk.find(k=>keys.some(x=>x.toLowerCase()===k.toLowerCase()));return a.map((row,i)=>({id:Date.now().toString()+i,name:(nf?String(row[nf]||"").trim():"")||`طالبة ${i+1}`,group:(gf?String(row[gf]||"").trim():"")||"غير محددة",avatar:AVT[i%AVT.length],stars:0,hifzPct:0,goal:80})).filter(s=>s.name&&s.name!=="undefined");}
  const parse=txt=>{setErr("");try{const s=detect(JSON.parse(txt));if(!s.length)throw new Error("لا بيانات");setPreview(s);}catch(e){setErr(e.message||"خطأ");setPreview(null);}};
  const hf=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setRaw(ev.target.result);parse(ev.target.result);};r.readAsText(f);};
  const groups=preview?[...new Set(preview.map(s=>s.group))]:[];
  return(
    <Modal open={open} onClose={()=>{reset();onClose();}} title="📥 استيراد الطالبات" wide>
      <div style={{display:"flex",gap:6,marginBottom:16}}>{[["file","📂 رفع ملف"],["paste","📋 لصق JSON"]].map(([v,l])=><button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"9px",borderRadius:9,border:`2px solid ${mode===v?C.green:C.borderCol}`,background:mode===v?C.greenPale:C.subtleBg,fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",color:mode===v?C.green:C.textMid}}>{l}</button>)}</div>
      {mode==="file"?<div style={{marginBottom:14,textAlign:"center"}}><input ref={fr} type="file" accept=".json" onChange={hf} style={{display:"none"}}/><div onClick={()=>fr.current.click()} style={{border:`2px dashed ${C.borderCol}`,borderRadius:13,padding:"28px 20px",cursor:"pointer",background:C.subtleBg}}><div style={{fontSize:32,marginBottom:9}}>📂</div><div style={{fontWeight:700,color:C.textMid,marginBottom:4}}>اضغط لاختيار ملف JSON</div><div style={{fontSize:12,color:C.textLight}}>ملفات .json فقط</div></div></div>
      :<textarea value={raw} onChange={e=>{setRaw(e.target.value);if(e.target.value.trim())parse(e.target.value);}} placeholder={'[\n  {"الاسم":"فاطمة","الحلقة":"حلقة الصباح"},\n  ...\n]'} style={{width:"100%",minHeight:120,padding:"11px 13px",border:`1.5px solid ${C.borderCol}`,borderRadius:10,fontFamily:"monospace",fontSize:12,marginBottom:13,color:C.textDark,background:C.subtleBg,outline:"none",boxSizing:"border-box",resize:"vertical",direction:"ltr"}}/>}
      <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:9,padding:"8px 12px",fontSize:12,color:"#92400E",marginBottom:12}}>💡 يتعرف تلقائياً على حقول الاسم والحلقة بالعربي والإنجليزي</div>
      {err&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:9,padding:"9px 12px",fontSize:13,color:C.danger,marginBottom:12}}>❌ {err}</div>}
      {preview&&<div style={{marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14,color:C.green,marginBottom:9}}>✅ {preview.length} طالبة — {groups.length} حلقة</div>

// ─── Grant Stars ─────────────────────────────────────
function ModalGrant({open,onClose,students,preSelected,onSave,categories}){
  const[sid,setSid]=useState("");const[stars,setStars]=useState(1);const[cat,setCat]=useState("");const[note,setNote]=useState("");
  useEffect(()=>{if(open){if(preSelected)setSid(preSelected.id);if(categories?.length){setCat(categories[0].id);setStars(categories[0].pts||1);}}},[preSelected,open,categories]);
  const sc=c=>{setCat(c.id);setStars(c.pts||1);};
  const save=()=>{if(!sid)return;const s=students.find(x=>x.id===sid);const c=categories.find(x=>x.id===cat);onSave({studentId:sid,stars,category:cat,note:note||(c?.label||""),avatar:s.avatar,studentName:s.name,time:Date.now()});setNote("");onClose();};
  return(
    <Modal open={open} onClose={onClose} title="⭐ منح نجوم">

      <div style={{marginBottom:13}}><label style={{fontSize:13,fontWeight:700,color:C.textMid,display:"block",marginBottom:7}}>عدد النجوم <span style={{color:C.textLight,fontWeight:400,fontSize:11}}>(يمكن تعديله)</span></label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[1,2,3,5,10].map(n=><button key={n} onClick={()=>setStars(n)} style={{padding:"9px 13px",borderRadius:9,border:`2px solid ${stars===n?C.gold:C.borderCol}`,background:stars===n?"#FFFBEB":C.subtleBg,fontWeight:700,fontSize:13,cursor:"pointer",color:stars===n?C.gold:C.textDark,fontFamily:"'Cairo',sans-serif"}}>{"⭐".repeat(Math.min(n,3))}{n>3?` ×${n}`:""} {n}</button>)}</div></div>
      <div style={{marginBottom:17}}><label style={{fontSize:13,fontWeight:700,color:C.textMid,display:"block",marginBottom:7}}>ملاحظة (اختياري)</label><Inp value={note} onChange={e=>setNote(e.target.value)} placeholder="كلمة تشجيعية..."/></div>

              <Lv stars={s.stars} levels={levels} small/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:11}}><span style={{fontSize:20,fontWeight:900,color:C.textDark}}>{s.stars}</span><span style={{fontSize:11,color:C.textLight}}>نجمة</span><span style={{marginRight:"auto",fontSize:14}}>{"⭐".repeat(Math.min(5,s.stars))}{"☆".repeat(Math.max(0,5-s.stars))}</span></div>
            <div style={{marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textLight,marginBottom:3}}><span>الحفظ</span><span style={{fontWeight:700,color:C.textDark}}>{hifz}%</span></div><PBar pct={hifz}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textLight,marginTop:7,marginBottom:3}}><span>تحقيق الهدف</span><span style={{fontWeight:700,color:C.textDark}}>{Math.round(Math.min(100,(hifz/(s.goal||80))*100))}%</span></div><PBar pct={(hifz/(s.goal||80))*100} color={`linear-gradient(90deg,${C.gold},${C.goldLight})`}/>
            </div>
            <div style={{display:"flex",gap:7,paddingTop:10,borderTop:`1px solid ${C.borderCol}`}}><Btn variant="green" onClick={()=>onGrant(s)} style={{flex:1,justifyContent:"center",fontSize:12}}>⭐ منح</Btn><Btn variant="danger" onClick={()=>onDelete(s.id)} style={{fontSize:12}}>🗑️</Btn></div>
          </div>
        );})}
      </div>}
    </div>
  );
}

function VReports({students,levels}){
  const sorted=[...students].sort((a,b)=>b.stars-a.stars);const maxS=sorted[0]?.stars||1;const total=students.reduce((s,st)=>s+st.stars,0);
  const sh=["#15803D","#16A34A","#22C55E","#4ADE80","#86EFAC","#BBF7D0","#D1FAE5","#F0FDF4"];
  return(
    <div>
      <div style={{background:C.cardBg,borderRadius:13,padding:20,boxShadow:"0 1px 5px rgba(0,0,0,0.04)",border:`1px solid ${C.borderCol}`,marginBottom:18}}>
        <ST>📊 مقارنة النجوم</ST>
        {!sorted.length?<ES icon="📊" text="لا توجد بيانات"/>:sorted.map((s,i)=>{const pct=Math.round((s.stars/maxS)*100);return(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
            <div style={{width:90,fontSize:12,fontWeight:600,textAlign:"right",flexShrink:0,color:C.textMid}}>{s.avatar} {s.name.split(" ")[0]}</div>
            <div style={{flex:1,height:23,background:C.subtleBg,borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:sh[Math.min(i,7)],borderRadius:6,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingLeft:6,transition:"width 0.8s ease"}}>{pct>20&&<span style={{fontSize:11,fontWeight:700,color:"#fff"}}>⭐{s.stars}</span>}</div></div>
            <div style={{width:50,fontSize:12,fontWeight:700,color:C.textMid,flexShrink:0}}>⭐{s.stars}</div>
          </div>
        );})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{background:C.cardBg,borderRadius:13,padding:20,boxShadow:"0 1px 5px rgba(0,0,0,0.04)",border:`1px solid ${C.borderCol}`}}>
          <ST>🎖️ توزيع المستويات</ST>
          {[...levels].reverse().map(l=>{const cnt=students.filter(s=>glv(s.stars,levels).name===l.name).length;return(
            <div key={l.id} style={{marginBottom:11}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,marginBottom:3}}><span>{l.icon} {l.name}</span><span style={{color:C.textLight}}>{cnt}</span></div><PBar pct={students.length?(cnt/students.length)*100:0} color={l.color}/></div>
          );})}
        </div>
        <div style={{background:C.cardBg,borderRadius:13,padding:20,boxShadow:"0 1px 5px rgba(0,0,0,0.04)",border:`1px solid ${C.borderCol}`}}>
          <ST>📈 ملخص</ST>
          {[["إجمالي النجوم",`⭐ ${total}`],["عدد الطالبات",`👩‍🎓 ${students.length}`],["متوسط النجوم",`⭐ ${students.length?(total/students.length).toFixed(1):0}`],["الأعلى",sorted[0]?`${sorted[0].avatar} ${sorted[0].stars}⭐`:"—"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.subtleBg,borderRadius:8,marginBottom:8}}><span style={{fontSize:12,color:C.textMid}}>{l}</span><span style={{fontWeight:900,fontSize:14,color:C.green}}>{v}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Login ────────────────────────────────────────────
function Login({onT,onS,settings}){
  const[pwd,setPwd]=useState("");const[err,setErr]=useState(false);
  const a=settings.accentColor||C.green;
  const go=()=>{if(pwd===PWD)onT();else{setErr(true);setTimeout(()=>setErr(false),2000);}};
  return(
    <div style={{minHeight:"100vh",background:C.pageBg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Cairo',sans-serif",direction:"rtl",padding:20}}>
      <Logo s={settings} size={70}/>
      <div style={{fontFamily:"'Amiri',serif",fontSize:23,color:C.textDark,fontWeight:700,marginTop:14,marginBottom:3}}>{settings.centerName}</div>
      <div style={{fontSize:13,color:C.textLight,marginBottom:30}}>{settings.centerSubtitle}</div>
      <div style={{background:C.cardBg,borderRadius:17,padding:"26px 24px",width:"100%",maxWidth:350,boxShadow:"0 4px 20px rgba(0,0,0,0.07)",border:`1px solid ${C.borderCol}`}}>
        <button onClick={onS} style={{width:"100%",padding:14,borderRadius:11,border:"none",background:a,color:"#fff",fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:16,boxShadow:`0 4px 14px ${a}40`}}>👩‍🎓 عرض لوحة النجوم</button>
        <div style={{textAlign:"center",fontSize:12,color:C.textLight,margin:"0 0 13px",position:"relative"}}><span style={{background:C.cardBg,padding:"0 11px",position:"relative",zIndex:1}}>دخول المعلمة</span><div style={{position:"absolute",top:"50%",left:0,right:0,height:1,background:C.borderCol}}/></div>
        <Inp type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="🔑 كلمة المرور" style={{marginBottom:9,border:`1.5px solid ${err?C.danger:C.borderCol}`}}/>
        {err&&<div style={{fontSize:12,color:C.danger,marginBottom:8,textAlign:"center"}}>❌ كلمة المرور غير صحيحة</div>}
        <button onClick={go} onKeyDown={e=>e.key==="Enter"&&go()} style={{width:"100%",padding:12,borderRadius:10,border:`1.5px solid ${a}`,background:"transparent",color:a,fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>دخول المعلمة</button>
        <div style={{fontSize:11,color:C.textLight,textAlign:"center",marginTop:8}}>كلمة المرور: quran1446</div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────
const TT=[{id:"dashboard",label:"الرئيسية",icon:"🏠"},{id:"leaderboard",label:"لوحة الشرف",icon:"🏆"},{id:"students",label:"الطالبات",icon:"👩‍🎓"},{id:"reports",label:"التقارير",icon:"📊"},{id:"levels",label:"المستويات",icon:"🎖️"}];
const TS=[{id:"leaderboard",label:"لوحة الشرف",icon:"🏆"},{id:"levels",label:"المستويات",icon:"🎖️"}];

function App(){
  const[role,setRole]=useState(null);const[tab,setTab]=useState("leaderboard");
  const[data,setData]=useState({students:[],achievements:[]});
  const[settings,setSettings]=useState({...DS});
  const[loading,setLoading]=useState(true);
  const[mAdd,setMAdd]=useState(false);const[mGrant,setMGrant]=useState(false);
  const[mSet,setMSet]=useState(false);const[mImp,setMImp]=useState(false);
  const[gPre,setGPre]=useState(null);const[toast,setToast]=useState({show:false,msg:""});

  const showToast=msg=>{setToast({show:true,msg});setTimeout(()=>setToast(t=>({...t,show:false})),3000);};

  useEffect(()=>{
    const u1=db.ref("data").on("value",snap=>setData(snap.exists()?snap.val():{students:[],achievements:[]}));
    const u2=db.ref("settings").on("value",snap=>{if(snap.exists()){const p=snap.val();setSettings({...DS,...p,levels:p.levels||DL,categories:p.categories||DC});}});
    setTimeout(()=>setLoading(false),1200);
    return()=>{db.ref("data").off("value",u1);db.ref("settings").off("value",u2);};
  },[]);

  const addSt=async s=>{const nd={...data,students:[...data.students,s]};setData(nd);await saveData(nd);showToast(`✅ تم إضافة ${s.name}`);};
  const imp=async imported=>{const ex=new Set(data.students.map(s=>`${s.name}|${s.group}`));const fresh=imported.filter(s=>!ex.has(`${s.name}|${s.group}`));const nd={...data,students:[...data.students,...fresh]};setData(nd);await saveData(nd);showToast(`📥 تم استيراد ${fresh.length} طالبة`);};
  const grant=async({studentId,stars,category,note,avatar,studentName,time})=>{const ns=data.students.map(s=>s.id===studentId?{...s,stars:s.stars+stars,hifzPct:Math.min(100,(s.hifzPct||0)+(category==="hifz"?12:4))}:s);const na=[{studentId,studentName,avatar,stars,category,note,time},...data.achievements].slice(0,60);const nd={students:ns,achievements:na};setData(nd);await saveData(nd);showToast(`⭐ تم منح ${stars} نجمة لـ ${studentName}!`);};
  const del=async id=>{if(!window.confirm("هل تريدين حذف هذه الطالبة؟"))return;const nd={students:data.students.filter(s=>s.id!==id),achievements:data.achievements.filter(a=>a.studentId!==id)};setData(nd);await saveData(nd);showToast("🗑️ تم حذف الطالبة");};
  const saveSt=async s=>{setSettings(s);await saveSettings(s);showToast("✅ تم حفظ إعدادات المركز");};

  const acc=settings.accentColor||C.green;const lv=settings.levels||DL;const cats=settings.categories||DC;
  const groups=[...new Set(data.students.map(s=>s.group))];const isT=role==="teacher";const tabs=isT?TT:TS;
  const setR=r=>{setRole(r);setTab(r==="teacher"?"dashboard":"leaderboard");};

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:C.pageBg}}>
      <div style={{fontSize:48,animation:"spin 1.5s linear infinite"}}>⭐</div>
      <div style={{fontFamily:"'Cairo',sans-serif",fontSize:15,color:C.textMid,fontWeight:600}}>جاري التحميل...</div>
    </div>
  );

  if(!role)return <Login onT={()=>setR("teacher")} onS={()=>setR("student")} settings={settings}/>;

  return(
    <div style={{minHeight:"100vh",background:C.pageBg,fontFamily:"'Cairo',sans-serif",direction:"rtl",color:C.textDark,overflowX:"hidden"}}>
      <header style={{background:C.cardBg,borderBottom:`1px solid ${C.borderCol}`,position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",maxWidth:1200,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}><Logo s={settings} size={44}/><div><div style={{fontFamily:"'Amiri',serif",fontSize:17,color:C.textDark,fontWeight:700}}>{settings.centerName}</div><div style={{fontSize:11,color:C.textLight}}>{settings.centerSubtitle}</div></div></div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {isT&&<><Btn variant="ghost" onClick={()=>setMImp(true)} style={{fontSize:12}}>📥 استيراد</Btn><Btn variant="green" onClick={()=>setMAdd(true)} style={{fontSize:12}}>➕ طالبة</Btn><Btn variant="gold" onClick={()=>setMGrant(true)} style={{fontSize:12}}>⭐ منح نجوم</Btn><Btn variant="ghost" onClick={()=>setMSet(true)} style={{fontSize:12,padding:"9px 11px"}}>⚙️</Btn></>}
            <button onClick={()=>setRole(null)} style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${C.borderCol}`,background:C.subtleBg,cursor:"pointer",fontFamily:"'Cairo',sans-serif",fontSize:12,fontWeight:600,color:C.textMid}}>{isT?"👩‍🏫 خروج":"👩‍🎓 خروج"}</button>
          </div>
        </div>
        <div style={{borderTop:`1px solid ${C.borderCol}`,overflowX:"auto"}}>
          <div style={{display:"flex",maxWidth:1200,margin:"0 auto",padding:"0 20px"}}>
            {tabs.map(t=><div key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 16px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",color:tab===t.id?acc:C.textMid,borderBottom:tab===t.id?`2.5px solid ${acc}`:"2.5px solid transparent",transition:"all 0.15s",display:"flex",alignItems:"center",gap:5}}>{t.icon} {t.label}</div>)}
          </div>
        </div>
      </header>
      <main style={{maxWidth:1200,margin:"0 auto",padding:"22px 16px"}}>
        {tab==="dashboard" &&isT&&<VDash students={data.students} achievements={data.achievements} levels={lv} categories={cats}/>}
        {tab==="leaderboard"&&<VLead students={data.students} levels={lv}/>}
        {tab==="students"  &&isT&&<VStudents students={data.students} levels={lv} onAdd={()=>setMAdd(true)} onGrant={s=>{setGPre(s);setMGrant(true);}} onDelete={del}/>}
        {tab==="reports"   &&isT&&<VReports students={data.students} levels={lv}/>}
        {tab==="levels"    &&<VLevels levels={lv} categories={cats}/>}
      </main>
      <ModalAdd open={mAdd} onClose={()=>setMAdd(false)} onSave={addSt} existingGroups={groups}/>
      <ModalGrant open={mGrant} onClose={()=>{setMGrant(false);setGPre(null);}} students={data.students} preSelected={gPre} onSave={grant} categories={cats}/>
      <ModalSettings open={mSet} onClose={()=>setMSet(false)} settings={settings} onSave={saveSt}/>
      <ModalImport open={mImp} onClose={()=>setMImp(false)} onImport={imp}/>
      <Toast msg={toast.msg} show={toast.show}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
